<ion-app>

  <!-- MENU -->
  <ion-menu contentId="main-content">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Menu</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-item button (click)="irPara('conta')">Conta</ion-item>
        <ion-item button (click)="irPara('configuracoes')">Configurações</ion-item>
        <ion-item button (click)="irPara('suporte')">Suporte</ion-item>
        <ion-item button (click)="irPara('login')">Sair</ion-item>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- CONTEÚDO PRINCIPAL -->
  <div id="main-content"></div>

    <ion-header>
      <ion-toolbar color="primary">
        <ion-buttons slot="start">
          <ion-menu-button></ion-menu-button>
        </ion-buttons>
        <ion-title></ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>

      <ion-searchbar placeholder="Buscar..."></ion-searchbar>

      <ion-grid>
        <ion-row>
          <ion-col size="6"><ion-button expand="block">psiquiatra</ion-button></ion-col>
          <ion-col size="6"><ion-button expand="block">terapeuta</ion-button></ion-col>
          <ion-col size="6"><ion-button expand="block">psicólogo</ion-button></ion-col>
          <ion-col size="6"><ion-button expand="block">...</ion-button></ion-col>
        </ion-row>
      </ion-grid>

      <ion-card>
        <ion-card-header>
          <ion-card-title>Instituições</ion-card-title>
        </ion-card-header>

        <ion-card-content>
          <ion-item>Nome da instituição</ion-item>
          <ion-item>Nome da instituição</ion-item>
          <ion-item>Nome da instituição</ion-item>
        </ion-card-content>
      </ion-card>

    </ion-content>

    <!-- TABS -->
    <ion-tabs>
      <ion-router-outlet></ion-router-outlet>

      <ion-tab-bar slot="bottom">
        <ion-tab-button tab="home">
          <ion-icon name="home"></ion-icon>
          <ion-label>Inicio</ion-label>
        </ion-tab-button>

        <ion-tab-button tab="buscar">
          <ion-icon name="search"></ion-icon>
          <ion-label>Perfil</ion-label>
        </ion-tab-button>

        <ion-tab-button tab="perfil">
          <ion-icon name="person"></ion-icon>
          <ion-label>Calendario</ion-label>
        </ion-tab-button>
      </ion-tab-bar>
    </ion-tabs>

  

</ion-app>
